<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Estilos específicos para a tela de login */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa; /* Cor de fundo clara */
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header img {
            max-width: 120px;
            margin-bottom: 1rem;
        }
        .alert-error {
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="/img/logo.png" alt="Logo Jacto" class="img-fluid">
            <h4>Acesso ao Dashboard</h4>
        </div>
        <div class="mb-3">
            <label for="passwordInput" class="form-label">Senha:</label>
            <input type="password" class="form-control" id="passwordInput" placeholder="Digite a senha">
        </div>
        <button id="loginButton" class="btn btn-primary w-100">Entrar</button>
        <div id="errorAlert" class="alert alert-danger alert-error">Senha incorreta. Tente novamente.</div>
    </div>

    <script src="/scripts/script.js"></script>
</body>
</html>
